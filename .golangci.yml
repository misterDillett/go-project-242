version: "2"

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - bodyclose
    - unconvert
    - prealloc
    - revive

  settings:
    govet:
      enable:
        - shadow
    gocyclo:
      min-complexity: 15
    dupl:
      threshold: 100
    goconst:
      min-len: 2
      min-occurrences: 2
    misspell:
      locale: US
    lll:
      line-length: 140
    goimports:
      local-prefixes:
        - github.com/misterDillett/go-project-242

  exclusions:
    rules:
      - linters:
          - revive
        text: "comment on exported"
      - linters:
          - revive
        text: "should have comment"
      - linters:
          - staticcheck
        text: "SA1019"

formatters:
  enable:
    - gofmt
    - goimports

  settings:
    goimports:
      local-prefixes:
        - github.com/misterDillett/go-project-242

run:
  timeout: 5m
  tests: true
  modules-download-mode: readonly

issues:
  max-issues-per-linter: 0
  max-same-issues: 0